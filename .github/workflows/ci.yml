name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (JDK 17)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble release
        run: ./gradlew :asqio-sdk:assembleRelease --no-daemon --stacktrace

      - name: Run unit tests
        run: ./gradlew :asqio-sdk:testReleaseUnitTest --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: asqio-sdk/build/reports/tests/testReleaseUnitTest
          if-no-files-found: ignore

      - name: Upload AAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: asqio-sdk-release-aar
          path: asqio-sdk/build/outputs/aar/asqio-sdk-release.aar
          if-no-files-found: error
